<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elpris DK2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: rgba(0,0,0,0.35);
  --text: #fff;
  --muted: rgba(255,255,255,0.6);
  --low: #4ecb8a;
  --mid: #f0a040;
  --high: #f05555;
}
body {
  font-family: 'Inter', sans-serif;
  color: var(--text);
  padding: 20px;
}
.card {
  backdrop-filter: blur(10px);
  background: var(--bg);
  border-radius: 14px;
  padding: 18px;
  max-width: 420px;
  margin-top: 10px;
}
.price-row {
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
}
.price {
  font-size:64px;
  font-weight:600;
  letter-spacing:-2px;
}
.unit {
  font-size:14px;
  color: var(--muted);
  margin-left:6px;
}
.badge {
  font-size:12px;
  padding:6px 12px;
  border-radius:20px;
  font-weight:500;
}
.stats {
  display:flex;
  justify-content:space-between;
  margin:10px 0 14px;
  font-size:12px;
}
.stats span {
  color: var(--muted);
}
.bar-list {
  display:flex;
  flex-direction:column;
  gap:6px;
}
.row {
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
}
.row.current-hour {
  font-weight:600;
}
.time {
  width:42px;
  text-align:right;
  color: var(--muted);
}
.row.current-hour .time {
  color: #fff;
}
.track {
  flex:1;
  height:8px;
  background: rgba(255,255,255,0.08);
  border-radius:4px;
  overflow:hidden;
}
.fill {
  height:100%;
  border-radius:4px;
}
.value {
  width:48px;
  text-align:right;
}
</style>
</head>
<body>
<div class="card" id="app">Indlæser...</div>
<script>
const pad = n => String(n).padStart(2, '0');

// ─── AFGIFTER OG TARIFFER ────────────────────────────────
const ELAFGIFT      = 0.01;
const TRANSMISSION  = 0.14;
const MOMS          = 1.25;
const KORREKTION    = 0.05;

const RADIUS = {
  lav:    0.1017,
  normal: 0.1694,
  hoj:    0.5081
};

function getRadiusTarif(hour) {
  if (hour >= 0  && hour <= 5)  return RADIUS.lav;
  if (hour >= 17 && hour <= 20) return RADIUS.hoj;
  return RADIUS.normal;
}

function beregnPris(spotPris, hour) {
  const radiusTarif = getRadiusTarif(hour);
  return ((spotPris + ELAFGIFT + TRANSMISSION + radiusTarif) * MOMS) - KORREKTION;
}
// ─────────────────────────────────────────────────────────

function apiUrl(d) {
  return `https://www.elprisenligenu.dk/api/v1/prices/${d.getFullYear()}/${pad(d.getMonth()+1)}-${pad(d.getDate())}_DK2.json`;
}

// Skalér bjælke: billigste = MIN_BAR%, dyreste = 100%
const MIN_BAR = 25;

function beregnBjælke(pris, min, max) {
  if (max === min) return MIN_BAR;
  return MIN_BAR + ((pris - min) / (max - min)) * (100 - MIN_BAR);
}

async function load() {
  const now = new Date();
  const currentHour = now.getHours();

  // Hent dagens data
  const resToday = await fetch(apiUrl(now));
  const dataToday = await resToday.json();

  // Hent morgendagens data
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate() + 1);
  let dataTomorrow = [];
  try {
    const resTomorrow = await fetch(apiUrl(tomorrow));
    if (resTomorrow.ok) {
      dataTomorrow = await resTomorrow.json();
    }
  } catch(e) {}

  // Byg rullende 24 timers vindue fra nuværende time
  const window24 = [];
  for (let i = 0; i < 24; i++) {
    const hour = (currentHour + i) % 24;
    const isNextDay = (currentHour + i) >= 24;
    if (isNextDay && dataTomorrow.length > 0) {
      window24.push({ hour, spotPris: dataTomorrow[hour].DKK_per_kWh, isNextDay: true });
    } else if (!isNextDay) {
      window24.push({ hour, spotPris: dataToday[hour].DKK_per_kWh, isNextDay: false });
    }
  }

  // Beregn priser for vinduet
  const prices = window24.map(e => beregnPris(e.spotPris, e.hour));
  const min = Math.min(...prices);
  const max = Math.max(...prices);
  const avg = prices.reduce((a,b) => a+b, 0) / prices.length;
  const current = beregnPris(dataToday[currentHour].DKK_per_kWh, currentHour);

  function color(v) {
    const r = (v - min) / (max - min);
    return r < 0.33 ? 'var(--low)' : r < 0.66 ? 'var(--mid)' : 'var(--high)';
  }

  function format(v) {
    return v.toFixed(2).replace('.', ',');
  }

  const bars = window24.map((e, i) => {
    const pris = prices[i];
    const pct = beregnBjælke(pris, min, max);
    const isCurrentHour = i === 0;
    const dayLabel = e.isNextDay ? ' <span style="color:var(--muted);font-size:10px">+1</span>' : '';
    return `
      <div class="row ${isCurrentHour ? 'current-hour' : ''}">
        <div class="time">${pad(e.hour)}:00${dayLabel}</div>
        <div class="track">
          <div class="fill" style="width:${pct}%;background:${color(pris)}"></div>
        </div>
        <div class="value" style="color:${color(pris)}">${format(pris)}</div>
      </div>
    `;
  }).join('');

  document.getElementById('app').innerHTML = `
    <div class="price-row">
      <div>
        <span class="price" style="color:${color(current)}">${format(current)}</span>
        <span class="unit">kr/kWh</span>
      </div>
      <div class="badge" style="background:${color(current)}">
        Nu: ${current===min?'Billigst':current===max?'Dyrest':'Normal'}
      </div>
    </div>
    <div class="stats">
      <div><span>Lav</span><br>${format(min)}</div>
      <div><span>Snit</span><br>${format(avg)}</div>
      <div><span>Høj</span><br>${format(max)}</div>
    </div>
    <div class="bar-list">${bars}</div>
  `;
}

load();
setInterval(load, 900000);
</script>
</body>
</html>
