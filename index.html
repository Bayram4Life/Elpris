<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elpris DK2</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: transparent;
      --ink: #ffffff;
      --ink-soft: rgba(255,255,255,0.7);
      --ink-faint: rgba(255,255,255,0.45);
      --border: rgba(255,255,255,0.2);
      --low: #4ecb8a;
      --mid: #f0a040;
      --high: #f05555;
      --accent: #7ab8f5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      padding: 20px 18px;
    }

    /* Header — keep original colors, not white */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .title {
      font-family: 'Roboto', sans-serif;
      font-size: 20px;
    }

    .subtitle {
      font-size: 9px;
      color: #aaa59e;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .zone-badge {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      padding: 3px 8px;
      border-radius: 3px;
    }

    /* Current summary row */
    .summary {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .big-price {
      font-family: 'Roboto', sans-serif;
      font-size: 58px;
      line-height: 1;
      letter-spacing: -2px;
      transition: color 0.5s;
    }

    .price-unit {
      font-size: 12px;
      color: var(--ink-soft);
    }

    .status-pill {
      margin-left: auto;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      color: white;
      align-self: center;
    }

    /* Bar list */
    .bar-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 18px;
    }

    .bar-row.is-current {
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      margin: 0 -4px;
      padding: 0 4px;
    }

    .bar-row.is-midnight {
      margin-top: 5px;
      padding-top: 5px;
      border-top: 1px dashed var(--border);
    }

    .time-label {
      font-size: 10px;
      color: var(--ink-faint);
      width: 38px;
      flex-shrink: 0;
      text-align: right;
      letter-spacing: 0.03em;
    }

    .bar-row.is-current .time-label {
      color: white;
      font-weight: 500;
    }

    .bar-track {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }

    .bar-row.is-future .bar-fill {
      opacity: 0.4;
    }

    /* "Nu" pulse on current bar */
    .bar-row.is-current .bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 3px;
      background: rgba(255,255,255,0.6);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .price-label {
      font-size: 11px;
      font-weight: 500;
      width: 46px;
      flex-shrink: 0;
      letter-spacing: 0.01em;
      color: white;
    }

    .bar-row.is-current .price-label {
      font-weight: 500;
    }

    .bar-row.is-future .price-label {
      opacity: 0.55;
    }

    /* Midnight label */
    .midnight-tag {
      font-size: 8px;
      color: var(--accent);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-left: auto;
      align-self: center;
    }

    /* Now tag */
    .now-tag {
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      background: rgba(255,255,255,0.15);
      padding: 1px 5px;
      border-radius: 10px;
    }

    /* Footer */
    .footer {
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stat-value { font-size: 13px; font-weight: 500; color: white; }
    .stat-label {
      font-size: 8px;
      color: var(--ink-faint);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .updated {
      font-size: 8px;
      color: var(--ink-faint);
      text-align: right;
      line-height: 1.6;
    }

    .current-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 2px;
    }

    .current-hour-label {
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .msg {
      text-align: center;
      padding: 60px;
      color: #aaa59e;
      font-size: 12px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .f { opacity: 0; animation: fadeUp 0.4s ease forwards; }
    .f1 { animation-delay: 0.00s; }
    .f2 { animation-delay: 0.07s; }
    .f3 { animation-delay: 0.14s; }
  </style>
</head>
<body>
  <div id="root"><div class="msg">Henter elpriser…</div></div>

  <script>
    const pad = n => String(n).padStart(2, '0');

    function apiUrl(d) {
      return `https://www.elprisenligenu.dk/api/v1/prices/${d.getFullYear()}/${pad(d.getMonth()+1)}-${pad(d.getDate())}_DK2.json`;
    }

    function tomorrow(d) {
      const t = new Date(d);
      t.setDate(t.getDate() + 1);
      return t;
    }

    function colorFor(v, min, max) {
      const r = max > min ? (v - min) / (max - min) : 0.5;
      return r < 0.33 ? 'var(--low)' : r < 0.66 ? 'var(--mid)' : 'var(--high)';
    }

    function statusFor(v, min, max) {
      const r = max > min ? (v - min) / (max - min) : 0.5;
      return r < 0.33 ? 'Lav' : r < 0.66 ? 'Middel' : 'Høj';
    }

    function oere(dkk) { return dkk.toFixed(2).replace('.', ','); }

    async function fetchDay(date) {
      try {
        const res = await fetch(apiUrl(date));
        if (!res.ok) return [];
        return await res.json();
      } catch(e) { return []; }
    }

    async function load() {
      const now = new Date();

      const [todayRecs, tomorrowRecs] = await Promise.all([
        fetchDay(now),
        fetchDay(tomorrow(now))
      ]);

      if (!todayRecs || todayRecs.length === 0) {
        document.getElementById('root').innerHTML =
          '<div class="msg">Ingen priser tilgængelige.<br><small style="opacity:.5">Prøv igen om lidt.</small></div>';
        return;
      }

      const allRecs = [...todayRecs, ...tomorrowRecs]
        .sort((a, b) => new Date(a.time_start) - new Date(b.time_start));

      // Rolling window: current hour → +24h
      const windowStart = new Date(now);
      windowStart.setMinutes(0, 0, 0);
      const windowEnd = new Date(windowStart);
      windowEnd.setHours(windowEnd.getHours() + 24);

      const display = allRecs.filter(r => {
        const t = new Date(r.time_start);
        return t >= windowStart && t < windowEnd;
      });

      const recs = display.length >= 2 ? display : allRecs;

      const prices = recs.map(r => r.DKK_per_kWh);
      const min = Math.min(...prices);
      const max = Math.max(...prices);
      const avg = prices.reduce((a,b) => a+b, 0) / prices.length;

      const cp = recs[0].DKK_per_kWh;
      const color = colorFor(cp, min, max);
      const currentHour = now.getHours();

      const hasTomorrow = tomorrowRecs.length > 0;

      // Build bar rows
      const rows = recs.map((r, i) => {
        const t = new Date(r.time_start);
        const h = t.getHours();
        const timeStr = `${pad(h)}:00`;
        const price = r.DKK_per_kWh;
        const pct = max > min ? ((price - min) / (max - min)) * 85 + 10 : 50;
        const c = colorFor(price, min, max);
        const isCurrent = i === 0;
        const isFuture = i > 0;
        const isMidnight = i > 0 && h === 0;

        let classes = 'bar-row';
        if (isCurrent) classes += ' is-current';
        if (isFuture)  classes += ' is-future';
        if (isMidnight) classes += ' is-midnight';

        const rightTag = isCurrent
          ? `<span class="now-tag">Nu</span>`
          : isMidnight
            ? `<span class="midnight-tag">I morgen</span>`
            : '';

        return `
          <div class="${classes}">
            <div class="time-label">${timeStr}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${pct}%;background:${c}"></div>
            </div>
            <div class="price-label" style="color:${c}">${oere(price)}</div>
            ${rightTag}
          </div>`;
      }).join('');

      const dayStr = now.toLocaleDateString('da-DK', { weekday: 'long', day: 'numeric', month: 'long' });
      const updStr = now.toLocaleTimeString('da-DK', { hour: '2-digit', minute: '2-digit' });

      document.getElementById('root').innerHTML = `
        <div class="footer f f1">
          <div>
            <div class="stat-value" style="color:var(--low)">${oere(min)}</div>
            <div class="stat-label">Laveste</div>
          </div>
          <div>
            <div class="stat-value" style="color:var(--ink-soft)">${oere(avg)}</div>
            <div class="stat-label">Gennemsnit</div>
          </div>
          <div>
            <div class="stat-value" style="color:var(--high)">${oere(max)}</div>
            <div class="stat-label">Højeste</div>
          </div>
          <div class="updated">
            Opdateret ${updStr}${!hasTomorrow ? '<br><span style="color:var(--accent)">Morgendagens priser ikke klar endnu</span>' : ''}
          </div>
        </div>

        <div class="summary f f2">
          <div>
            <div class="current-label">Aktuel pris</div>
            <div style="display:flex;align-items:baseline;gap:8px">
              <div class="big-price" style="color:${color}">${oere(cp)}</div>
              <div class="price-unit">kr/kWh</div>
            </div>
            <div class="current-hour-label">${pad(currentHour)}:00 – ${pad(currentHour+1)}:00</div>
          </div>
          <div class="status-pill" style="background:${color}">${statusFor(cp, min, max)} pris</div>
        </div>

        <div class="bar-list f f3">${rows}</div>


      `;
    }

    load();
    setInterval(load, 15 * 60 * 1000);
  </script>
</body>
</html>
